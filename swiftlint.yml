disabled_rules:
  - trailing_whitespace
  - line_length

opt_in_rules:
  - force_unwrapping
  - explicit_init
  - empty_count
  - closure_spacing
  - redundant_nil_coalescing
  - sorted_imports

included:
  - Sources
  - Tests

excluded:
  - .build
  - Packages

force_unwrapping:
  severity: error

function_body_length:
  warning: 60
  error: 120

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length: 2
  excluded: [id, db, os, os_, x, y, dx, dy]
